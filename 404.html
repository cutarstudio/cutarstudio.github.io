<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | CUT AR STUDIO</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-main: #0d0d0d; 
            --text-light: #ffffff; 
            --text-muted: #999999; 
            --accent: #d4af37; /* Dorado Premium */
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif; 
        }
        
        body { 
            background: black;
            color: var(--text-light); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            text-align: center; 
            padding: 20px; 
            overflow: hidden;
        }

        .error-container { 
            max-width: 600px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-logo { 
            width: 100px; 
            margin-bottom: 20px; 
          
        }

        .error-container h1 { 
            font-size: clamp(6rem, 15vw, 10rem); 
            font-weight: 900; 
            color: var(--accent); 
            line-height: 1; 
            margin-bottom: 10px; 
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3); 
            letter-spacing: -5px;
        }

        .error-container h2 { 
            font-size: clamp(1.2rem, 4vw, 2rem); 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            font-weight: 800;
        }

        .error-container p { 
            color: var(--text-muted); 
            margin-bottom: 35px; 
            font-size: 1.1rem; 
            line-height: 1.6; 
        }

        .btn-volver { 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            background-color: transparent; 
            color: var(--accent); 
            padding: 15px 35px; 
            font-size: 1rem; 
            font-weight: 800; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            border: 2px solid var(--accent); 
            transition: all 0.3s ease; 
            cursor: pointer; 
            border-radius: 5px; 
        }

        .btn-volver:hover { 
            background-color: var(--accent); 
            color: var(--bg-main); 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); 
            transform: translateY(-3px);
        }

        /* Elementos de fondo decorativos */
        .bg-icon {
            position: absolute;
            font-size: 30vw;
            color: rgba(255, 255, 255, 0.02);
            z-index: -1;
            transform: rotate(-15deg);
        }
    </style>
</head>
<body>

    <i class="fa-solid fa-scissors bg-icon"></i>

    <div class="error-container">
        <img src="logo.png" alt="CUT AR STUDIO" class="error-logo">
        <h1>404</h1>
        <h2>¡Ups! Te pasaste de la línea</h2>
        <p>La página que estás buscando no existe, fue eliminada o escribiste mal la dirección. Pero no te preocupes, siempre podemos arreglar el corte.</p>
        <a href="index.html" class="btn-volver">
            <i class="fa-solid fa-house"></i> Volver al Inicio
        </a>
    </div>

</body>
</html>
